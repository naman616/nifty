<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KEYFORGE — Typing Test</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0c0e14;
    --surface:  #13161f;
    --border:   #1f2333;
    --text:     #cdd6f4;
    --dim:      #45475a;
    --correct:  #a6e3a1;
    --wrong:    #f38ba8;
    --pending:  #cdd6f4;
    --cursor:   #89b4fa;
    --accent:   #89b4fa;
    --gold:     #f9e2af;
    --green:    #a6e3a1;
    --red:      #f38ba8;
    --mauve:    #cba6f7;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 860px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 48px;
  }
  .logo {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    color: var(--accent);
    letter-spacing: 2px;
  }
  .logo span { color: var(--dim); font-size: 14px; font-family: 'Space Mono', monospace; margin-left: 10px; }

  .mode-btns { display: flex; gap: 8px; }
  .mode-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all .2s;
  }
  .mode-btn:hover, .mode-btn.active {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(137,180,250,.07);
  }

  /* ── Live stats bar ── */
  .live-stats {
    width: 100%; max-width: 860px;
    display: flex; gap: 32px;
    margin-bottom: 24px;
  }
  .stat { display: flex; flex-direction: column; }
  .stat-val { font-size: 36px; font-weight: 700; color: var(--text); line-height: 1; }
  .stat-val.highlight { color: var(--accent); }
  .stat-label { font-size: 10px; color: var(--dim); letter-spacing: 2px; margin-top: 4px; text-transform: uppercase; }

  /* ── Timer ring ── */
  .timer-wrap { margin-left: auto; position: relative; width: 64px; height: 64px; }
  .timer-ring { transform: rotate(-90deg); }
  .timer-ring circle { transition: stroke-dashoffset .1s linear; }
  .timer-num {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 700; color: var(--accent);
  }

  /* ── Text display ── */
  .text-box {
    width: 100%; max-width: 860px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 32px 36px;
    font-size: 22px;
    line-height: 2;
    letter-spacing: .03em;
    position: relative;
    cursor: text;
    user-select: none;
    min-height: 140px;
  }
  .text-box:focus-within { border-color: rgba(137,180,250,.35); }

  .char { position: relative; }
  .char.correct  { color: var(--correct); }
  .char.wrong    { color: var(--wrong); background: rgba(243,139,168,.12); border-radius: 2px; }
  .char.pending  { color: var(--dim); }
  .char.current::after {
    content: '';
    position: absolute;
    left: 0; top: 4px; bottom: 4px;
    width: 2px;
    background: var(--cursor);
    border-radius: 2px;
    animation: blink .9s step-end infinite;
  }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  #hidden-input {
    position: absolute; opacity: 0; pointer-events: none;
    width: 1px; height: 1px; top: 0; left: 0;
  }

  .start-hint {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; color: var(--dim); letter-spacing: 2px;
    text-transform: uppercase; pointer-events: none;
    transition: opacity .3s;
  }

  /* ── Progress bar ── */
  .progress-bar-wrap {
    width: 100%; max-width: 860px;
    height: 3px; background: var(--border);
    border-radius: 2px; margin: 12px 0 24px;
  }
  .progress-bar-fill {
    height: 100%; background: var(--accent);
    border-radius: 2px; transition: width .1s;
    width: 0%;
  }

  /* ── Keystroke timeline ── */
  .timeline-wrap {
    width: 100%; max-width: 860px;
    margin-top: 24px;
  }
  .section-title {
    font-size: 11px; letter-spacing: 3px; color: var(--dim);
    text-transform: uppercase; margin-bottom: 12px;
  }
  .timeline {
    height: 48px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    display: flex; align-items: flex-end;
    gap: 2px; padding: 6px 8px;
  }
  .t-bar {
    flex: 1; border-radius: 2px 2px 0 0;
    transition: height .1s;
    min-width: 4px;
  }

  /* ── Results overlay ── */
  #results {
    display: none;
    position: fixed; inset: 0;
    background: rgba(12,14,20,.92);
    backdrop-filter: blur(12px);
    z-index: 100;
    align-items: center; justify-content: center;
    flex-direction: column;
    animation: fadeIn .4s ease;
  }
  #results.show { display: flex; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

  .results-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 56px;
    width: 560px;
    max-width: 95vw;
  }
  .results-title {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--accent);
    margin-bottom: 4px;
  }
  .results-sub { font-size: 11px; color: var(--dim); letter-spacing: 2px; margin-bottom: 36px; }

  .results-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 20px; margin-bottom: 32px;
  }
  .r-stat {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .r-val { font-size: 40px; font-weight: 700; line-height: 1; }
  .r-label { font-size: 10px; color: var(--dim); letter-spacing: 2px; margin-top: 6px; text-transform: uppercase; }

  /* Accuracy bar */
  .acc-breakdown { margin-bottom: 28px; }
  .acc-row { display: flex; gap: 4px; height: 10px; border-radius: 6px; overflow: hidden; margin: 8px 0 4px; }
  .acc-correct { background: var(--correct); }
  .acc-wrong   { background: var(--red); }
  .acc-labels  { display: flex; justify-content: space-between; font-size: 11px; color: var(--dim); }

  /* WPM over time mini chart */
  .wpm-chart { margin-bottom: 28px; }
  .wpm-chart canvas { width: 100%; height: 80px; border-radius: 6px; }

  .btn-row { display: flex; gap: 12px; }
  .btn-primary {
    flex: 1;
    background: var(--accent); color: var(--bg);
    border: none; border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 13px; font-weight: 700;
    padding: 14px; cursor: pointer;
    letter-spacing: 1px; transition: opacity .2s;
  }
  .btn-primary:hover { opacity: .85; }
  .btn-secondary {
    flex: 1;
    background: none; color: var(--text);
    border: 1px solid var(--border); border-radius: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 13px; padding: 14px; cursor: pointer;
    transition: border-color .2s;
  }
  .btn-secondary:hover { border-color: var(--accent); }

  /* Grade badge */
  .grade {
    display: inline-block;
    font-size: 48px; font-weight: 700;
    width: 80px; height: 80px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
  }
  .grade-s { background: rgba(249,226,175,.15); color: var(--gold); border: 2px solid var(--gold); }
  .grade-a { background: rgba(166,227,161,.15); color: var(--green); border: 2px solid var(--green); }
  .grade-b { background: rgba(137,180,250,.15); color: var(--accent); border: 2px solid var(--accent); }
  .grade-c { background: rgba(203,166,247,.15); color: var(--mauve); border: 2px solid var(--mauve); }
  .grade-d { background: rgba(243,139,168,.15); color: var(--red);   border: 2px solid var(--red); }

</style>
</head>
<body>

<header>
  <div class="logo">KEYFORGE <span>typing test</span></div>
  <div class="mode-btns">
    <button class="mode-btn active" data-time="30">30s</button>
    <button class="mode-btn" data-time="60">60s</button>
    <button class="mode-btn" data-time="120">120s</button>
  </div>
</header>

<!-- Live stats -->
<div class="live-stats">
  <div class="stat">
    <div class="stat-val highlight" id="live-wpm">0</div>
    <div class="stat-label">WPM</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="live-acc">—</div>
    <div class="stat-label">Accuracy</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="live-chars">0</div>
    <div class="stat-label">Chars</div>
  </div>
  <div class="stat">
    <div class="stat-val" id="live-errors">0</div>
    <div class="stat-label">Errors</div>
  </div>
  <div class="timer-wrap">
    <svg class="timer-ring" width="64" height="64" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="28" fill="none" stroke="#1f2333" stroke-width="4"/>
      <circle id="timer-arc" cx="32" cy="32" r="28" fill="none"
              stroke="#89b4fa" stroke-width="4"
              stroke-dasharray="175.9" stroke-dashoffset="0"
              stroke-linecap="round"/>
    </svg>
    <div class="timer-num" id="timer-num">—</div>
  </div>
</div>

<!-- Progress bar -->
<div class="progress-bar-wrap"><div class="progress-bar-fill" id="prog-bar"></div></div>

<!-- Typing area -->
<div class="text-box" id="text-box" tabindex="0">
  <div id="text-render"></div>
  <input id="hidden-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"/>
  <div class="start-hint" id="start-hint">Click here or press any key to start</div>
</div>

<!-- Keystroke timeline -->
<div class="timeline-wrap">
  <div class="section-title">Keystroke speed timeline</div>
  <div class="timeline" id="timeline"></div>
</div>

<!-- Results overlay -->
<div id="results">
  <div class="results-card">
    <div class="grade" id="r-grade">S</div>
    <div class="results-title" id="r-title">Blazing Fast</div>
    <div class="results-sub" id="r-sub">YOUR RESULTS</div>
    <div class="results-grid">
      <div class="r-stat"><div class="r-val" id="r-wpm" style="color:var(--accent)">0</div><div class="r-label">WPM</div></div>
      <div class="r-stat"><div class="r-val" id="r-acc" style="color:var(--green)">0%</div><div class="r-label">Accuracy</div></div>
      <div class="r-stat"><div class="r-val" id="r-chars" style="color:var(--mauve)">0</div><div class="r-label">Characters</div></div>
      <div class="r-stat"><div class="r-val" id="r-errors" style="color:var(--red)">0</div><div class="r-label">Errors</div></div>
    </div>

    <div class="acc-breakdown">
      <div class="section-title">Accuracy breakdown</div>
      <div class="acc-row" id="acc-row"></div>
      <div class="acc-labels"><span id="acc-correct-lbl"></span><span id="acc-wrong-lbl"></span></div>
    </div>

    <div class="wpm-chart">
      <div class="section-title">WPM over time</div>
      <canvas id="wpm-canvas" width="600" height="80"></canvas>
    </div>

    <div class="btn-row">
      <button class="btn-primary" onclick="restart()">Try Again</button>
      <button class="btn-secondary" onclick="newText()">New Text</button>
    </div>
  </div>
</div>

<script>
// ── Word banks ──────────────────────────────────────────────────────────────
const WORDS = [
  "the","be","to","of","and","a","in","that","have","it","for","not","on",
  "with","he","as","you","do","at","this","but","his","by","from","they",
  "we","say","her","she","or","an","will","my","one","all","would","there",
  "their","what","so","up","out","if","about","who","get","which","go","me",
  "when","make","can","like","time","no","just","him","know","take","people",
  "into","year","your","good","some","could","them","see","other","than",
  "then","now","look","only","come","its","over","think","also","back","after",
  "use","two","how","our","work","first","well","way","even","new","want",
  "because","any","these","give","day","most","us","between","need","large",
  "often","hand","high","place","hold","turn","move","live","toward","before",
  "point","world","near","build","self","earth","father","head","stand","own",
  "page","found","answer","school","grow","study","still","learn","plant",
  "cover","food","sun","four","between","state","keep","eye","never","last",
  "let","thought","city","tree","cross","farm","hard","start","might","story",
  "saw","far","sea","draw","left","late","run","while","press","close","night",
  "real","life","few","north","open","seem","together","next","white","children",
  "begin","got","walk","example","ease","paper","group","always","music","those"
];

function generateText(n = 80) {
  let out = [];
  for (let i = 0; i < n; i++) out.push(WORDS[Math.floor(Math.random()*WORDS.length)]);
  return out.join(' ');
}

// ── State ───────────────────────────────────────────────────────────────────
let targetText   = generateText();
let typed        = '';
let started      = false;
let finished     = false;
let startTime    = null;
let timeDuration = 30;
let timerHandle  = null;
let secondsLeft  = 30;
let wpmHistory   = [];       // wpm snapshot per second
let keyTimes     = [];       // ms between keystrokes for timeline
let lastKeyTime  = null;
let correctCount = 0;
let errorCount   = 0;
let totalTyped   = 0;

// ── DOM refs ────────────────────────────────────────────────────────────────
const textRender  = document.getElementById('text-render');
const hiddenInput = document.getElementById('hidden-input');
const startHint   = document.getElementById('start-hint');
const textBox     = document.getElementById('text-box');
const timerArc    = document.getElementById('timer-arc');
const timerNum    = document.getElementById('timer-num');
const progBar     = document.getElementById('prog-bar');
const timeline    = document.getElementById('timeline');

// ── Render text ─────────────────────────────────────────────────────────────
function renderText() {
  textRender.innerHTML = '';
  for (let i = 0; i < targetText.length; i++) {
    const span = document.createElement('span');
    span.classList.add('char');
    span.textContent = targetText[i] === ' ' ? '\u00a0' : targetText[i];
    if (i < typed.length) {
      span.classList.add(typed[i] === targetText[i] ? 'correct' : 'wrong');
    } else if (i === typed.length) {
      span.classList.add('current');
    } else {
      span.classList.add('pending');
    }
    textRender.appendChild(span);
  }
}

// ── Live stat updates ────────────────────────────────────────────────────────
function updateStats() {
  const elapsed = started ? (Date.now() - startTime) / 60000 : 0;
  const words   = correctCount / 5;
  const wpm     = elapsed > 0 ? Math.round(words / elapsed) : 0;
  const acc     = totalTyped > 0 ? Math.round((correctCount / totalTyped) * 100) : 0;

  document.getElementById('live-wpm').textContent    = wpm;
  document.getElementById('live-acc').textContent    = totalTyped > 0 ? acc + '%' : '—';
  document.getElementById('live-chars').textContent  = totalTyped;
  document.getElementById('live-errors').textContent = errorCount;
  progBar.style.width = (typed.length / targetText.length * 100) + '%';
}

// ── Timer ────────────────────────────────────────────────────────────────────
const CIRCUMFERENCE = 2 * Math.PI * 28;  // r=28

function updateTimerUI() {
  const frac = secondsLeft / timeDuration;
  timerArc.style.strokeDashoffset = CIRCUMFERENCE * (1 - frac);
  timerArc.style.stroke = frac > .4 ? '#89b4fa' : frac > .2 ? '#f9e2af' : '#f38ba8';
  timerNum.textContent  = secondsLeft;
}

function startTimer() {
  startTime  = Date.now();
  secondsLeft = timeDuration;
  updateTimerUI();

  timerHandle = setInterval(() => {
    secondsLeft--;
    updateTimerUI();

    // WPM snapshot
    const elapsed = (Date.now() - startTime) / 60000;
    const wpm = elapsed > 0 ? Math.round((correctCount / 5) / elapsed) : 0;
    wpmHistory.push(wpm);
    updateTimeline();

    if (secondsLeft <= 0) endTest();
  }, 1000);
}

// ── Timeline ─────────────────────────────────────────────────────────────────
function updateTimeline() {
  timeline.innerHTML = '';
  const maxGap = Math.max(...keyTimes, 1000);
  const show   = keyTimes.slice(-120);
  show.forEach(ms => {
    const bar  = document.createElement('div');
    bar.classList.add('t-bar');
    const h    = Math.min(100, Math.round((ms / maxGap) * 100));
    bar.style.height     = h + '%';
    bar.style.background = ms < 150 ? 'var(--green)' : ms < 350 ? 'var(--accent)' : 'var(--red)';
    timeline.appendChild(bar);
  });
}

// ── Input handling ───────────────────────────────────────────────────────────
hiddenInput.addEventListener('input', e => {
  if (finished) return;
  const val = hiddenInput.value;

  if (!started) {
    started = true;
    startHint.style.opacity = '0';
    startTimer();
  }

  // Keystroke timing
  const now = Date.now();
  if (lastKeyTime !== null) keyTimes.push(now - lastKeyTime);
  lastKeyTime = now;

  // Only allow typing forward (no pasting big chunks)
  if (val.length <= targetText.length) {
    const prev = typed;
    typed = val;

    // Count correct / errors
    correctCount = 0; errorCount = 0; totalTyped = typed.length;
    for (let i = 0; i < typed.length; i++) {
      if (typed[i] === targetText[i]) correctCount++;
      else errorCount++;
    }
  }
  hiddenInput.value = typed;   // keep input in sync

  renderText();
  updateStats();

  // Auto-finish when all typed
  if (typed.length >= targetText.length) endTest();
});

// ── Keyboard shortcuts ────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Tab') { e.preventDefault(); restart(); return; }
  if (!finished) hiddenInput.focus();
});
textBox.addEventListener('click', () => hiddenInput.focus());

// ── End test ──────────────────────────────────────────────────────────────────
function endTest() {
  if (finished) return;
  finished = true;
  clearInterval(timerHandle);

  const elapsed = (Date.now() - startTime) / 60000;
  const wpm     = Math.round((correctCount / 5) / elapsed);
  const acc     = totalTyped > 0 ? Math.round(correctCount / totalTyped * 100) : 0;

  showResults(wpm, acc);
}

// ── Results screen ────────────────────────────────────────────────────────────
function showResults(wpm, acc) {
  document.getElementById('r-wpm').textContent    = wpm;
  document.getElementById('r-acc').textContent    = acc + '%';
  document.getElementById('r-chars').textContent  = totalTyped;
  document.getElementById('r-errors').textContent = errorCount;

  // Grade
  let grade, title, gClass;
  if (wpm >= 100 && acc >= 97)      { grade='S'; title='Legendary Speed';   gClass='grade-s'; }
  else if (wpm >= 80 && acc >= 95)  { grade='A'; title='Expert Typist';     gClass='grade-a'; }
  else if (wpm >= 60 && acc >= 90)  { grade='B'; title='Above Average';     gClass='grade-b'; }
  else if (wpm >= 40 && acc >= 85)  { grade='C'; title='Getting There';     gClass='grade-c'; }
  else                               { grade='D'; title='Keep Practicing';   gClass='grade-d'; }

  const gradeEl = document.getElementById('r-grade');
  gradeEl.textContent = grade;
  gradeEl.className   = 'grade ' + gClass;
  document.getElementById('r-title').textContent = title;

  // Accuracy bar
  const accRow  = document.getElementById('acc-row');
  accRow.innerHTML = '';
  const cDiv = document.createElement('div');
  cDiv.className = 'acc-correct';
  cDiv.style.flex = correctCount;
  accRow.appendChild(cDiv);
  const wDiv = document.createElement('div');
  wDiv.className = 'acc-wrong';
  wDiv.style.flex = errorCount;
  accRow.appendChild(wDiv);
  document.getElementById('acc-correct-lbl').textContent = `✓ ${correctCount} correct`;
  document.getElementById('acc-wrong-lbl').textContent   = `✗ ${errorCount} errors`;

  // WPM chart
  drawWpmChart();

  document.getElementById('results').classList.add('show');
}

function drawWpmChart() {
  const canvas = document.getElementById('wpm-canvas');
  const ctx    = canvas.getContext('2d');
  canvas.width = 600; canvas.height = 80;
  const data   = wpmHistory;
  if (data.length < 2) return;

  const max  = Math.max(...data, 10);
  const w    = canvas.width, h = canvas.height;
  const padX = 0, padY = 8;

  ctx.clearRect(0, 0, w, h);

  // Fill gradient
  const grad = ctx.createLinearGradient(0, 0, 0, h);
  grad.addColorStop(0,   'rgba(137,180,250,.35)');
  grad.addColorStop(1,   'rgba(137,180,250,.02)');

  ctx.beginPath();
  data.forEach((v, i) => {
    const x = padX + (i / (data.length - 1)) * (w - padX * 2);
    const y = padY + (1 - v / max) * (h - padY * 2);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(w - padX, h);
  ctx.lineTo(padX, h);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  data.forEach((v, i) => {
    const x = padX + (i / (data.length - 1)) * (w - padX * 2);
    const y = padY + (1 - v / max) * (h - padY * 2);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.strokeStyle = '#89b4fa';
  ctx.lineWidth   = 2;
  ctx.lineJoin    = 'round';
  ctx.stroke();
}

// ── Controls ──────────────────────────────────────────────────────────────────
function restart() {
  document.getElementById('results').classList.remove('show');
  typed        = '';
  started      = false;
  finished     = false;
  startTime    = null;
  secondsLeft  = timeDuration;
  wpmHistory   = [];
  keyTimes     = [];
  lastKeyTime  = null;
  correctCount = 0;
  errorCount   = 0;
  totalTyped   = 0;
  clearInterval(timerHandle);

  timerArc.style.strokeDashoffset = 0;
  timerArc.style.stroke = '#89b4fa';
  timerNum.textContent  = '—';
  startHint.style.opacity = '1';
  progBar.style.width  = '0%';
  timeline.innerHTML   = '';

  document.getElementById('live-wpm').textContent    = '0';
  document.getElementById('live-acc').textContent    = '—';
  document.getElementById('live-chars').textContent  = '0';
  document.getElementById('live-errors').textContent = '0';

  hiddenInput.value = '';
  renderText();
}

function newText() {
  targetText = generateText();
  restart();
}

// Mode buttons
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    timeDuration = parseInt(btn.dataset.time);
    newText();
  });
});

// ── Init ──────────────────────────────────────────────────────────────────────
renderText();
</script>
</body>
</html>
